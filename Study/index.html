<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>햄스터 키우기</title>
    <style>
        body { text-align: center; background-color: #fff4e6; font-family: 'Arial', sans-serif; }
        #game-container { margin-top: 50px; }
        
        /* 이미지는 width로 크기 조절! */
        #hamster { 
            width: 600px;
            cursor: pointer; 
            transition: 0.3s; 
            display: inline-block; 
        }
        
        #hamstatus {
            font-size: 50px;
            color: #e67e22;
            font-weight: bold;
            min-width: 200px;
            height: 60px; /* 높이를 고정해야 화면이 안 들썩거려 */
        }
        
        .stats { font-size: 20px; margin: 20px; color: #555; }
        
        button { 
            padding: 10px 20px; font-size: 18px; cursor: pointer; 
            border-radius: 20px; border: none; background: #ffcc00; transition: 0.2s; 
        }
        button:hover { background: #ffa500; transform: scale(1.1); }
        
        #message { 
            font-size: 40px; /* 대사 시원시원하게 키움 */
            height: 100px; 
            color: #d35400; 
            font-weight: bold; 
            margin-top: 10px; 
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>햄스터 키우기</h1>
        
        <div class="stats">
            배고픔: <span id="hunger">100</span> | 스트레스 지수: <span id="stress">0</span>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
            <div id="hamstatus"></div>
            <!-- <div> 대신 <img> 태그 사용 -->
            <img id="hamster" src="hamster.png" alt="햄스터">
        </div>

        <div id="message">햄스터가 배고파요!</div>

        <br>

        <button onclick="feedHamster()">🌻 밥 주기</button>
        <button onclick="petHamster()">👋 쓰다듬기</button>
    </div>

    <script>
        let hunger = 100;
        let stress = 0;
        let hSize = 600; // 햄스터 크기를 기억할 변수

        const hamster = document.getElementById('hamster');
        const hamstatus = document.getElementById('hamstatus');
        const message = document.getElementById('message');

        // 밥 주기 기능
        function feedHamster() {
            if (hunger > 0) {
                hunger -= 10;
                hSize += 10; // 밥 먹을 때마다 10px씩 커짐

                // 이미지 교체와 크기 키우기
                hamster.src = "hamsterEat.png"; 
                hamster.style.width = hSize + "px";
                
                hamstatus.innerText = '(우물우물)';
                message.innerText = '냠냠! 꺼억~';
                document.getElementById('hunger').innerText = hunger;
                
                // 1초 뒤에 원래 표정으로
                setTimeout(() => { 
                    hamster.src = "hamster.png"; 
                    message.innerText = '야르~';
                    hamstatus.innerText = '';
                }, 1000);

                // ✨ 배고픔이 0이 됐을 때 처리 로직 추가
                if (hunger === 0) {
                    message.innerText = '아 배불러';
                    
                    setTimeout(() => {
                        hunger = 100; // 배고픔 리셋
                        hSize = 600;  // 크기 리셋
                        
                        // 화면 갱신
                        document.getElementById('hunger').innerText = hunger;
                        hamster.style.width = hSize + "px";
                        message.innerText = '배고파... 밥줘!';
                    }, 5000); // 5000ms = 5초
                }

            } else {
                message.innerText = '햄스터가 뚱뚱해졌어요!';
            }
        }

        // 쓰다듬기 기능
        function petHamster() {
            stress += 10;
            document.getElementById('stress').innerText = stress;

            // 😡 스트레스가 50 이상일 때 (폭주 모드)
            if (stress >= 50) {
                hamster.src = "hamsterUpset2.png";
                hamstatus.innerText = '(ㅈ됐다)';
                message.innerText = '꺼져!!!!!!!!!!!!';
                
                // 화면이 흔들리는 느낌을 주려면 진동 효과 살짝
                //hamster.style.transform = 'scale(1.5) rotate(-20deg)';
                //hamster.style.filter = 'sepia(100%) saturate(300%) hue-rotate(-50deg)'; // 빨갛게 달아오름
                
                // 폭주했을 때는 1초 정도 더 길게 화내게 설정
                setTimeout(() => { 
                    hamster.src = "hamsterUpset.png"; 
                    //hamster.style.transform = 'scale(1) rotate(0deg)';
                    hamster.style.filter = 'none';
                    message.innerText = '...인간, 조심해라.';
                    hamstatus.innerText = '';
                }, 1500);

            } else {
                // 😠 일반적인 화남 (기존 코드)
                hamster.src = "hamsterUpset.png";
                hamstatus.innerText = '(ㅅㅂ)';
                message.innerText = '만지지마라 인간.';
                
                //hamster.style.transform = 'scale(1.2) rotate(10deg)';
                
                setTimeout(() => { 
                    hamster.src = "hamster.png"; 
                    //hamster.style.transform = 'scale(1) rotate(0deg)';
                    message.innerText = '';
                    hamstatus.innerText = '';
                }, 500);
            }
        }
    </script>
</body>
</html>
